# Ares — Hermes Pentest Profile
# Drop-in config for ~/.hermes/profiles/pentest/config.yaml
# See README.md for setup instructions and required environment variables.

# Model routing strategy:
#   Sonnet  — default: orchestration, tool execution, report writing (fast, cheap)
#   Opus    — explicit: vuln analysis, attack chain building, exploitation decisions
#   Haiku   — smart routing: trivial turns (JSON parsing, format ops, tool invocations)
#
# The SKILL.md instructs the agent to delegate_task to Opus only for the steps
# that require deep reasoning. Everything else runs on Sonnet.

model:
  default: claude-sonnet-4-6
  provider: anthropic

agent:
  reasoning_effort: medium   # default for Sonnet orchestration turns
  max_turns: 200             # higher ceiling — more turns at lower cost

smart_model_routing:
  enabled: true
  max_simple_chars: 300
  max_simple_words: 50
  cheap_model:
    provider: anthropic
    model: claude-haiku-4-5-20251001  # trivial turns: parsing, formatting, lookups

compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20
  protect_last_n: 30
  summary_model: gemini-2.5-flash
  summary_provider: google

auxiliary:
  delegation:
    provider: anthropic
    model: claude-sonnet-4-6  # delegate_task default — Opus overridden per-call in skill
  vision:
    provider: auto
  web_extraction:
    provider: auto

fallback_model:
  provider: google
  model: gemini-2.5-pro

session:
  inactivity_minutes: 180

terminal:
  backend: docker
  docker_image: nikolaik/python-nodejs:python3.11-nodejs20
  docker_forward_env:
    - GITHUB_TOKEN
    - ZAP_API_KEY
    - ZAP_CONTAINER_IP
    - MOBSF_API_KEY
    - MOBSF_URL
  docker_env:
    ZAP_API_KEY: "${ZAP_API_KEY}"
    ZAP_CONTAINER_IP: "${ZAP_CONTAINER_IP}"
    MOBSF_URL: "${MOBSF_URL}"
    MOBSF_API_KEY: "${MOBSF_API_KEY}"
  docker_volumes:
    - "${HOME}/pentest-output:/pentest-output"
    - "${HOME}/pentest-output:/home/user/pentest-output"
  container_cpu: 2
  container_memory: 8192
  container_persistent: true

security:
  tirith_enabled: true
  tirith_fail_open: false
  redact_secrets: true

background:
  notify_on_complete: true

mcp_servers:
  playwright:
    command: npx
    args:
      - "@playwright/mcp@latest"
      - --headless
      - --no-sandbox
      - --browser
      - chromium
  pentest-ai:
    # MUST use /usr/bin/python3 (absolute path) — systemd PATH puts hermes venv first
    # which lacks pentest-ai dependencies. PYTHONPATH required for relative imports.
    # timeout: 1800 — start_engagement blocks 3-5 min; default 120s fires too early.
    command: /usr/bin/python3
    args:
      - /home/YOURUSER/tools/pentest-ai/mcp_server/server.py
    timeout: 1800
    env:
      PYTHONPATH: /home/YOURUSER/tools/pentest-ai
  gitnexus:
    command: npx
    args:
      - -y
      - gitnexus@latest
      - mcp
  mobsf:
    # iris MCP server
    command: /usr/bin/python3
    args:
      - /home/YOURUSER/tools/iris/mobsf.py
    env:
      MOBSF_URL: "${MOBSF_URL}"
      MOBSF_API_KEY: "${MOBSF_API_KEY}"
      PENTEST_OUTPUT: /pentest-output
  adb:
    # iris MCP server
    command: /usr/bin/python3
    args:
      - /home/YOURUSER/tools/iris/adb.py
    env:
      PENTEST_OUTPUT: /pentest-output
      ADB_PATH: /usr/lib/android-sdk/platform-tools/adb
  frida:
    # iris MCP server
    command: /usr/bin/python3
    args:
      - /home/YOURUSER/tools/iris/frida_mcp.py
    env:
      PENTEST_OUTPUT: /pentest-output
      ADB_PATH: /usr/lib/android-sdk/platform-tools/adb
      FRIDA_SERVER_PATH: /home/YOURUSER/tools/iris/frida-server/frida-server-android-x86_64
