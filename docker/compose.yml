# Ares — Pentest stack
#
# ZAP is intentionally absent from this file.
# Each engagement spawns its own ZAP container (Phase 0) and tears it down
# after delivery (Phase 7), giving complete isolation between parallel engagements.
#
# Usage:
#   cp .env.example .env && $EDITOR .env
#   docker compose --project-name ares up -d
#
# With Android emulator (requires /dev/kvm on bare metal):
#   docker compose --project-name ares --profile android up -d
#
# Build images first:
#   docker compose --project-name ares build

services:

  # ── Open WebUI — web UI for managing parallel engagements ───────────────
  # Connects to Hermes HTTP API at http://hermes:8643/v1 (OpenAI-compatible).
  # Open at http://localhost:3000 after `docker compose up`.
  # WEBUI_AUTH=false — no login for local deployments.
  # Set WEBUI_AUTH=true in .env + WEBUI_SECRET_KEY to enable user accounts.
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ares-open-webui
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    environment:
      # Point at Hermes — OpenAI-compatible endpoint
      OPENAI_API_BASE_URLS: "http://hermes:8643/v1"
      OPENAI_API_KEYS: "${HERMES_API_KEY:-}"
      # Disable built-in Ollama integration (not used in this stack)
      ENABLE_OLLAMA_API: "false"
      # Auth — false for local use, set to true for shared deployments
      WEBUI_AUTH: "${WEBUI_AUTH:-false}"
      WEBUI_SECRET_KEY: "${WEBUI_SECRET_KEY:-}"
      # Branding
      WEBUI_NAME: "Ares"
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - hermes

  # ── ares-tools — terminal image spawned per engagement by Hermes ─────────
  # Not a running service — built here so `docker compose build` produces it.
  # Hermes spawns containers from this image at runtime via Docker socket.
  ares-tools:
    build:
      context: ..
      dockerfile: docker/Dockerfile.tools
    image: ares-tools:latest
    profiles: [build-only]   # never started by `docker compose up`

  # ── Hermes + all MCP servers ──────────────────────────────────────────────
  hermes:
    build:
      context: ..
      dockerfile: docker/Dockerfile.hermes
    image: ares-hermes:latest
    container_name: ares-hermes
    restart: unless-stopped
    ports:
      - "${HERMES_WEB_PORT:-9119}:9119"
    env_file: .env
    environment:
      HERMES_HOME: /root/.hermes/profiles/pentest
      # Bind to all interfaces so SwarmClaw (on the compose network) can reach this container.
      # Requires API_SERVER_KEY — hermes refuses 0.0.0.0 without auth.
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_KEY: "${HERMES_API_KEY:-}"
      HERMES_WEB_PORT: "${HERMES_WEB_PORT:-9119}"
      # Override docker_volumes from config.yaml — compose expands ${PENTEST_OUTPUT} here,
      # whereas config.yaml bash-style ${VAR:-default} syntax is NOT expanded by Hermes.
      # ADB host bridge — connects the adb client inside this container to the
      # ADB server running on the host machine. The host server manages:
      #   - USB-connected phones (plug phone into host, authorize once)
      #   - Android Studio / Docker emulators (running on or mapped to host)
      # Requires the host ADB server to listen on all interfaces:
      #   adb kill-server && adb -a -P 5037 nodaemon server start
      # host.docker.internal resolves to the host IP on both Linux and macOS Docker.
      ANDROID_ADB_SERVER_HOST: "${ANDROID_ADB_SERVER_HOST:-host.docker.internal}"
      ANDROID_ADB_SERVER_PORT: "5037"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux + macOS Docker
    volumes:
      # Docker socket — required: Hermes spawns ares-tools terminal containers and
      # per-engagement ZAP containers at runtime. This grants the container full
      # Docker API access (equivalent to root on the host). Accepted tradeoff:
      # the alternative is running Hermes directly on the host, which is worse.
      # Mitigate with a socket proxy (e.g. tecnativa/docker-socket-proxy) if needed.
      - /var/run/docker.sock:/var/run/docker.sock
      # Named volume — shared with ares-tools terminal containers by name.
      # config.yaml references "ares-pentest-output:/pentest-output" so Docker resolves
      # the same named volume whether it's hermes or a spawned terminal container.
      - ares-pentest-output:/pentest-output
    depends_on:
      mobsf:
        condition: service_healthy

  # ── MoBSF ─────────────────────────────────────────────────────────────────
  # Shared across engagements — results are isolated by file hash, no contamination.
  # Exposed on host port 8100 so terminal containers reach it via 172.17.0.1:8100.
  mobsf:
    image: opensecurity/mobile-security-framework-mobsf:latest
    container_name: ares-mobsf
    restart: unless-stopped
    ports:
      - "8100:8000"
    volumes:
      - mobsf-data:/home/mobsf/.MobSF
    user: "9901:9901"   # MoBSF runs as uid 9901 — volume must match
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

  # ── Android emulator (optional) ───────────────────────────────────────────
  # Requires /dev/kvm — bare metal only, not VMs without nested virtualization.
  # View screen at http://localhost:6080
  # Start with: docker compose --project-name ares --profile android up -d
  android-emulator:
    image: budtmo/docker-android:emulator_13.0
    container_name: ares-android
    restart: unless-stopped
    profiles: [android]
    ports:
      - "127.0.0.1:5555:5555"   # ADB — localhost only (unauthenticated)
      - "127.0.0.1:6080:6080"   # VNC web viewer — localhost only (unauthenticated)
    environment:
      EMULATOR_DEVICE: "Samsung Galaxy S10"
      WEB_VNC: "true"
    devices:
      - /dev/kvm:/dev/kvm

volumes:
  mobsf-data:
  open-webui-data:
  # Pentest output — named volume shared between hermes and ares-tools terminal containers.
  # On Linux production the data lives inside Docker's volume store; use
  # `docker cp` or bind a host path via PENTEST_OUTPUT_DEVICE in .env if you
  # need direct host access (e.g. for report delivery).
  ares-pentest-output:
