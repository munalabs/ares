# Ares — Hermes Pentest Profile (Docker / Compose deployment)
# Baked into ares-hermes image at /root/.hermes/profiles/pentest/config.yaml
# For bare-metal, use ../config.yaml instead.
#
# Key differences from bare-metal:
#   - docker_image: ares-tools:latest (pre-built, no runtime installs)
#   - MCP paths: /opt/pentest-ai/ and /opt/mcp/ (baked into ares-hermes)
#   - ZAP is NOT a fixed service — spawned per engagement in Phase 0
#     ZAP_URL is written to /tmp/engagement.env by the agent at session start
#   - MoBSF reached via 172.17.0.1:8100 (Docker bridge)

model:
  default: claude-sonnet-4-6
  provider: anthropic

agent:
  reasoning_effort: medium
  max_turns: 200

smart_model_routing:
  enabled: true
  max_simple_chars: 300
  max_simple_words: 50
  cheap_model:
    provider: anthropic
    model: claude-haiku-4-5-20251001

compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20
  protect_last_n: 30
  summary_model: claude-haiku-4-5-20251001
  summary_provider: anthropic

auxiliary:
  delegation:
    provider: anthropic
    model: claude-sonnet-4-6
  vision:
    provider: auto
  web_extraction:
    provider: auto

session:
  inactivity_minutes: 180

terminal:
  backend: docker
  docker_image: ares-tools:latest
  docker_forward_env:
    - GITHUB_TOKEN
    - ZAP_API_KEY
    - MOBSF_API_KEY
    - MOBSF_URL
    - FRIDA_SERVER_ARCH
    - FRIDA_TCP_HOST
    - FRIDA_TCP_PORT
    - WORKSPACE_DIR
  docker_env:
    ZAP_API_KEY: "${ZAP_API_KEY}"
    MOBSF_URL: "http://172.17.0.1:8100"
    MOBSF_API_KEY: "${MOBSF_API_KEY}"
    # ZAP_URL is NOT set here — it's written to /tmp/engagement.env per engagement
    # (each engagement gets its own ZAP on a dynamic port)
  # docker_volumes — Hermes expands ${VAR} from its own environment before calling Docker.
  # PENTEST_OUTPUT and WORKSPACE_DIR come from .env (absolute host paths) via env_file.
  # /var/run/docker.sock is the Docker daemon socket (host path, always absolute).
  docker_volumes:
    - "${PENTEST_OUTPUT}:/pentest-output"
    - "${PENTEST_OUTPUT}:/home/user/pentest-output"
    - "/var/run/docker.sock:/var/run/docker.sock"
    - "${WORKSPACE_DIR}:/workspace"
  container_cpu: 1
  container_memory: 3072
  container_persistent: true

security:
  tirith_enabled: true
  tirith_fail_open: false
  redact_secrets: true

background:
  notify_on_complete: true

mcp_servers:
  burp:
    url: "http://${ANDROID_ADB_SERVER_HOST}:9877/"
    headers:
      Host: "127.0.0.1:9876"

  playwright:
    command: npx
    args:
      - "@playwright/mcp@latest"
      - --headless
      - --no-sandbox
      - --browser
      - chromium

  pentest-ai:
    command: /usr/bin/python3
    args:
      - /opt/pentest-ai/mcp_server/server.py
    timeout: 1800
    env:
      PYTHONPATH: /opt/pentest-ai

  gitnexus:
    command: gitnexus
    args:
      - mcp

  mobsf:
    command: /usr/bin/python3
    args:
      - /opt/mcp/mobsf.py
    env:
      MOBSF_URL: "http://172.17.0.1:8100"
      MOBSF_API_KEY: "${MOBSF_API_KEY}"
      PENTEST_OUTPUT: /pentest-output

  adb:
    command: /usr/bin/python3
    args:
      - /opt/mcp/adb.py
    env:
      PENTEST_OUTPUT: /pentest-output
      ADB_PATH: /usr/lib/android-sdk/platform-tools/adb
      # ADB client inside the container talks to the host ADB server via bridge.
      # Host must run: adb kill-server && adb -a -P 5037 nodaemon server start
      ANDROID_ADB_SERVER_HOST: "${ANDROID_ADB_SERVER_HOST}"
      ANDROID_ADB_SERVER_PORT: "${ANDROID_ADB_SERVER_PORT}"
      ADB_SERIAL: "${ADB_SERIAL}"

  frida:
    command: /usr/bin/python3
    args:
      - /opt/mcp/frida_mcp.py
    env:
      PENTEST_OUTPUT: /pentest-output
      ADB_PATH: /usr/lib/android-sdk/platform-tools/adb
      ANDROID_ADB_SERVER_HOST: "${ANDROID_ADB_SERVER_HOST}"
      ANDROID_ADB_SERVER_PORT: "${ANDROID_ADB_SERVER_PORT}"
      ADB_SERIAL: "${ADB_SERIAL}"
      FRIDA_SERVER_PATH: "/opt/mcp/frida-server/frida-server-android-${FRIDA_SERVER_ARCH}"
      FRIDA_DEVICE: "${ADB_SERIAL}"
      FRIDA_TCP_HOST: "${FRIDA_TCP_HOST}"
      FRIDA_TCP_PORT: "${FRIDA_TCP_PORT}"

  apk-sast:
    command: /usr/bin/python3
    args:
      - /opt/mcp/apk_sast.py
    env:
      PENTEST_OUTPUT: /pentest-output
