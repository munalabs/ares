# Ares — Hermes Pentest Profile (Docker / Compose deployment)
# Baked into ares-hermes image at /root/.hermes/profiles/pentest/config.yaml
# For bare-metal, use ../config.yaml instead.
#
# Key differences from bare-metal:
#   - docker_image: ares-tools:latest (pre-built, no runtime installs)
#   - MCP paths: /opt/pentest-ai/ and /opt/mcp/ (baked into ares-hermes)
#   - ZAP is NOT a fixed service — spawned per engagement in Phase 0
#     ZAP_URL is written to /tmp/engagement.env by the agent at session start
#   - MoBSF reached via 172.17.0.1:8100 (Docker bridge)

model:
  default: claude-sonnet-4-6
  provider: anthropic

agent:
  reasoning_effort: medium
  max_turns: 200

smart_model_routing:
  enabled: true
  max_simple_chars: 300
  max_simple_words: 50
  cheap_model:
    provider: anthropic
    model: claude-haiku-4-5-20251001

compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20
  protect_last_n: 30
  summary_model: claude-haiku-4-5-20251001
  summary_provider: anthropic

auxiliary:
  delegation:
    provider: anthropic
    model: claude-sonnet-4-6
  vision:
    provider: auto
  web_extraction:
    provider: auto

session:
  inactivity_minutes: 180

terminal:
  backend: docker
  docker_image: ares-tools:latest
  docker_forward_env:
    - GITHUB_TOKEN
    - ZAP_API_KEY
    - MOBSF_API_KEY
    - MOBSF_URL
    - FRIDA_SERVER_ARCH
  docker_env:
    ZAP_API_KEY: "${ZAP_API_KEY}"
    MOBSF_URL: "http://172.17.0.1:8100"
    MOBSF_API_KEY: "${MOBSF_API_KEY}"
    # ZAP_URL is NOT set here — it's written to /tmp/engagement.env per engagement
    # (each engagement gets its own ZAP on a dynamic port)
  # docker_volumes is intentionally absent here — the gateway overwrites
  # TERMINAL_DOCKER_VOLUMES from config.yaml, clobbering the compose.yml value.
  # The correct host path is set via TERMINAL_DOCKER_VOLUMES in compose.yml,
  # where Docker Compose expands ${PENTEST_OUTPUT} before the container starts.
  container_cpu: 4
  container_memory: 16384
  container_persistent: true

security:
  tirith_enabled: true
  tirith_fail_open: false
  redact_secrets: true

background:
  notify_on_complete: true

mcp_servers:
  playwright:
    command: npx
    args:
      - "@playwright/mcp@latest"
      - --headless
      - --no-sandbox
      - --browser
      - chromium

  pentest-ai:
    command: /usr/bin/python3
    args:
      - /opt/pentest-ai/mcp_server/server.py
    timeout: 1800
    env:
      PYTHONPATH: /opt/pentest-ai

  gitnexus:
    command: npx
    args:
      - -y
      - gitnexus@latest
      - mcp

  mobsf:
    command: /usr/bin/python3
    args:
      - /opt/mcp/mobsf.py
    env:
      MOBSF_URL: "http://172.17.0.1:8100"
      MOBSF_API_KEY: "${MOBSF_API_KEY}"
      PENTEST_OUTPUT: /pentest-output

  adb:
    command: /usr/bin/python3
    args:
      - /opt/mcp/adb.py
    env:
      PENTEST_OUTPUT: /pentest-output
      ADB_PATH: /usr/lib/android-sdk/platform-tools/adb
      # ADB client inside the container talks to the host ADB server via bridge.
      # Host must run: adb kill-server && adb -a -P 5037 nodaemon server start
      ANDROID_ADB_SERVER_HOST: "${ANDROID_ADB_SERVER_HOST:-host.docker.internal}"
      ANDROID_ADB_SERVER_PORT: "5037"
      ADB_SERIAL: "${ADB_SERIAL:-localhost:5555}"

  frida:
    command: /usr/bin/python3
    args:
      - /opt/mcp/frida.py
    env:
      PENTEST_OUTPUT: /pentest-output
      ADB_PATH: /usr/lib/android-sdk/platform-tools/adb
      ANDROID_ADB_SERVER_HOST: "${ANDROID_ADB_SERVER_HOST:-host.docker.internal}"
      ANDROID_ADB_SERVER_PORT: "5037"
      # FRIDA_SERVER_ARCH: x86_64 — Linux Docker emulator, Intel Mac AVD
      #                   arm64  — Apple Silicon AVD (M1/M2/M3/M4), most physical phones
      FRIDA_SERVER_PATH: "/opt/mcp/frida-server/frida-server-android-${FRIDA_SERVER_ARCH:-x86_64}"
      FRIDA_DEVICE: "${ADB_SERIAL:-localhost:5555}"
